<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Minería Real</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 p-6">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-xl font-bold mb-4">Estado del Worker (CKPool)</h1>
        <p id="last-update" class="text-sm text-slate-400 mb-6">Cargando...</p>
        
        <div class="bg-slate-900 rounded-xl border border-slate-800 overflow-hidden">
            <table class="w-full text-left text-xs">
                <thead>
                    <tr class="bg-slate-950 uppercase text-slate-500">
                        <th class="p-4">Worker</th>
                        <th class="p-4">Hashrate (5m)</th>
                        <th class="p-4">Hashrate (1d)</th>
                        <th class="p-4">Shares</th>
                    </tr>
                </thead>
                <tbody id="tabla-workers" class="divide-y divide-slate-800">
                    <tr><td colspan="4" class="p-4 text-center">Cargando...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        fetch('stats.json?t=' + new Date().getTime())
            .then(r => r.json())
            .then(d => {
                document.getElementById('last-update').innerText = "Última actualización: " + d.last_updated;
                const tabla = document.getElementById('tabla-workers');
                tabla.innerHTML = "";

                if (d.worker) {
                    Object.entries(d.worker).forEach(([nombre, w]) => {
                        // CKPool entrega los datos en hashes/s, dividimos por 1 billón (1e12) para TH/s
                        const h5m = (w.hashrate5m / 1e12).toFixed(3);
                        const h1d = (w.hashrate1d / 1e12).toFixed(3);
                        
                        tabla.innerHTML += `
                            <tr class="hover:bg-slate-800">
                                <td class="p-4 font-bold text-orange-400">${nombre}</td>
                                <td class="p-4">${h5m} TH/s</td>
                                <td class="p-4">${h1d} TH/s</td>
                                <td class="p-4">${w.shares.toLocaleString()}</td>
                            </tr>
                        `;
                    });
                }
            });
    </script>
</body>
</html>
