<div class="bg-slate-900 rounded-2xl border border-slate-800 shadow-md overflow-hidden mt-6">
    <div class="px-5 py-4 bg-slate-950/40 border-b border-slate-800">
        <h3 class="text-sm font-bold text-slate-300">Desglose de Workers</h3>
    </div>
    <div class="overflow-x-auto text-xs">
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="bg-slate-950/80 text-slate-400 font-semibold uppercase tracking-wider border-b border-slate-800">
                    <th class="px-5 py-3">Nombre</th>
                    <th class="px-5 py-3">Hashrate (5m)</th>
                    <th class="px-5 py-3">Hashrate (1d)</th>
                    <th class="px-5 py-3">Shares</th>
                </tr>
            </thead>
            <tbody id="tabla-workers" class="divide-y divide-slate-800/50 text-slate-300">
                </tbody>
        </table>
    </div>
</div>

<script>
    fetch('stats.json?t=' + new Date().getTime())
        .then(r => r.json())
        .then(d => {
            // ... (tu lógica anterior para los totales sigue igual) ...
            
            const tabla = document.getElementById('tabla-workers');
            tabla.innerHTML = ""; // Limpiamos la tabla

            if (d.worker) {
                Object.entries(d.worker).forEach(([nombre, w]) => {
                    tabla.innerHTML += `
                        <tr class="hover:bg-slate-850/40">
                            <td class="px-5 py-3 font-mono text-orange-400 font-bold">${nombre}</td>
                            <td class="px-5 py-3">${(w.hashrate5m || 0).toFixed(2)}</td>
                            <td class="px-5 py-3">${(w.hashrate1d || 0).toFixed(2)}</td>
                            <td class="px-5 py-3">${w.shares || 0}</td>
                        </tr>
                    `;
                });
            }
        });
</script>
