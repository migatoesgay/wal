<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mining Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Mining Dashboard</h1>
        <p>Monitoreo de pools en tiempo real</p>
    </header>

    <main>
        <section class="card">
            <h2>Añadir Pool de Minería</h2>
            <form id="pool-form">
                <div class="form-group">
                    <label for="pool-name">Nombre del Pool / Algoritmo</label>
                    <input type="text" id="pool-name" placeholder="Ej. Ethermine (Ethash)" required>
                </div>
                <div class="form-group">
                    <label for="pool-url">Dirección Stratum (URL)</label>
                    <input type="text" id="pool-url" placeholder="Ej. stratum+tcp://eth.pool..." required>
                </div>
                <div class="form-group">
                    <label for="worker-name">Nombre del Worker</label>
                    <input type="text" id="worker-name" placeholder="Ej. Rig_01" required>
                </div>
                <button type="submit">Conectar Pool</button>
            </form>
        </section>

        <section class="card">
            <h2>Tus Pools en Tiempo Real</h2>
            <div id="pools-container" class="pools-grid">
                <!-- Las pools se generarán aquí dinámicamente con JS -->
                <p class="no-pools">No hay pools configuradas. Añade una arriba.</p>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
