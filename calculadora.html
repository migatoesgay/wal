<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Minería Solo</title>
    <style>
        :root { --btc: #f7931a; --bch: #8dc351; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; }
        .dashboard { width: 100%; max-width: 900px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: var(--card); padding: 2rem; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); border-top: 4px solid var(--border-color); }
        .btc { --border-color: var(--btc); }
        .bch { --border-color: var(--bch); }
        h2 { margin-top: 0; font-size: 1.5rem; }
        .input-group { margin: 1.2rem 0; }
        label { display: block; margin-bottom: 0.5rem; opacity: 0.8; font-size: 0.8rem; }
        .row { display: grid; grid-template-columns: 1fr 100px; gap: 10px; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #334155; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: var(--border-color); color: white; transition: 0.3s; }
        button:hover { filter: brightness(1.2); }
        .res { margin-top: 1.5rem; padding: 1rem; border-radius: 8px; background: rgba(0,0,0,0.2); text-align: center; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="card btc">
        <h2>Bitcoin (BTC)</h2>
        <div class="input-group">
            <label>Tu Hashrate</label>
            <div class="row">
                <input type="number" id="btcHashVal" placeholder="Ej: 100">
                <select id="btcHashUnit">
                    <option value="0.001">GH/s</option>
                    <option value="1" selected>TH/s</option>
                    <option value="1000">PH/s</option>
                </select>
            </div>
        </div>
        <div class="input-group">
            <label>Hashrate Red</label>
            <div class="row">
                <input type="number" id="btcNetVal" placeholder="Cargando...">
                <select id="btcNetUnit">
                    <option value="0.001">GH/s</option>
                    <option value="1" selected>TH/s</option>
                    <option value="1000">PH/s</option>
                </select>
            </div>
        </div>
        <button onclick="calcular('BTC')">Calcular Probabilidad</button>
        <div id="resBTC" class="res">Ingresa los datos</div>
    </div>

    <div class="card bch">
        <h2>Bitcoin Cash (BCH)</h2>
        <div class="input-group">
            <label>Tu Hashrate</label>
            <div class="row">
                <input type="number" id="bchHashVal" placeholder="Ej: 100">
                <select id="bchHashUnit">
                    <option value="0.001">GH/s</option>
                    <option value="1" selected>TH/s</option>
                    <option value="1000">PH/s</option>
                </select>
            </div>
        </div>
        <div class="input-group">
            <label>Hashrate Red</label>
            <div class="row">
                <input type="number" id="bchNetVal" placeholder="Ingresa valor manual">
                <select id="bchNetUnit">
                    <option value="0.001">GH/s</option>
                    <option value="1" selected>TH/s</option>
                    <option value="1000">PH/s</option>
                </select>
            </div>
        </div>
        <button onclick="calcular('BCH')">Calcular Probabilidad</button>
        <div id="resBCH" class="res">Ingresa los datos</div>
    </div>
</div>

<script>
    // Intentamos cargar el dato de BTC automáticamente al iniciar
    async function init() {
        try {
            const btcRes = await fetch('https://blockchain.info/q/hashrate?cors=true');
            const data = await btcRes.text();
            document.getElementById('btcNetVal').value = (data / 1000).toFixed(2);
        } catch (e) { 
            console.log("Carga automática no disponible, entrada manual activa."); 
        }
    }

    function calcular(t) {
        // Obtenemos los valores y los normalizamos a TH/s
        const user = parseFloat(document.getElementById(t.toLowerCase() + 'HashVal').value) * parseFloat(document.getElementById(t.toLowerCase() + 'HashUnit').value);
        const net = parseFloat(document.getElementById(t.toLowerCase() + 'NetVal').value) * parseFloat(document.getElementById(t.toLowerCase() + 'NetUnit').value);

        if (!user || !net) return alert("Por favor ingresa valores válidos en ambos campos.");
        
        // Cálculo de probabilidad en 24 horas (basado en 144 bloques diarios)
        // Fórmula: 1 - (1 - (hashrate_usuario / hashrate_red))^bloques_diarios
        const prob = (1 - Math.pow((1 - (user / net)), 144)) * 100;
        
        document.getElementById('res' + t).innerHTML = `Probabilidad (24h):<br>
            <strong style="font-size: 1.3rem">${prob.toFixed(6)}%</strong>`;
    }

    init();
</script>
</body>
</html>
