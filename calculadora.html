<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de Minería Solo</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        .container { display: flex; gap: 20px; flex-wrap: wrap; }
        .calc-box { flex: 1; padding: 1rem; border: 1px solid #ccc; border-radius: 8px; min-width: 300px; }
        .input-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.3rem; font-size: 0.9rem; }
        input { width: 100%; padding: 0.5rem; box-sizing: border-box; }
        button { width: 100%; color: white; border: none; padding: 0.7rem; cursor: pointer; margin-top: 0.5rem; }
        .btn-btc { background: #f7931a; }
        .btn-bch { background: #8dc351; }
        .resultado { margin-top: 1rem; padding: 0.5rem; background: #f4f4f4; font-size: 0.9rem; }
        #status { font-size: 0.8rem; color: #666; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h1>Calculadora de Probabilidad Solo Mining</h1>
    <p id="status">Cargando datos de la red...</p>
    
    <div class="container">
        <div class="calc-box">
            <h2 style="color: #f7931a;">Bitcoin (BTC)</h2>
            <div class="input-group">
                <label>Tu Hashrate (TH/s):</label>
                <input type="number" id="btcHash" placeholder="Ej: 100">
            </div>
            <div class="input-group">
                <label>Hashrate Red BTC (TH/s):</label>
                <input type="number" id="btcNet" readonly>
            </div>
            <button class="btn-btc" onclick="calcular('BTC')">Calcular BTC</button>
            <div id="resBTC" class="resultado"></div>
        </div>

        <div class="calc-box">
            <h2 style="color: #8dc351;">Bitcoin Cash (BCH)</h2>
            <div class="input-group">
                <label>Tu Hashrate (TH/s):</label>
                <input type="number" id="bchHash" placeholder="Ej: 100">
            </div>
            <div class="input-group">
                <label>Hashrate Red BCH (TH/s):</label>
                <input type="number" id="bchNet" readonly>
            </div>
            <button class="btn-bch" onclick="calcular('BCH')">Calcular BCH</button>
            <div id="resBCH" class="resultado"></div>
        </div>
    </div>

    <script>
        async function fetchNetworkHashrates() {
            const statusEl = document.getElementById('status');
            
            try {
                // 1. Cargar BTC
                const btcRes = await fetch('https://blockchain.info/q/hashrate?cors=true');
                const btcHashGH = await btcRes.text();
                document.getElementById('btcNet').value = (parseFloat(btcHashGH) / 1000).toFixed(2);

                // 2. Cargar BCH
                const bchRes = await fetch('https://api.blockchair.com/bitcoin-cash/stats');
                const bchData = await bchRes.json();
                if (bchData && bchData.data) {
                    const bchHashTH = parseFloat(bchData.data.hash_rate_24h) / 1e12;
                    document.getElementById('bchNet').value = bchHashTH.toFixed(2);
                }

                statusEl.innerText = "Datos actualizados correctamente.";
            } catch (error) {
                statusEl.innerText = "Error al cargar datos. Refresca la página.";
                console.error("Error:", error);
            }
        }

        function calcular(tipo) {
            const userHash = parseFloat(document.getElementById(tipo.toLowerCase() + 'Hash').value);
            const netHash = parseFloat(document.getElementById(tipo.toLowerCase() + 'Net').value);
            
            if (isNaN(userHash) || userHash <= 0 || isNaN(netHash)) {
                document.getElementById('res' + tipo).innerHTML = "Ingresa un hashrate válido.";
                return;
            }

            // Probabilidad en 24h (144 bloques aprox)
            const probPerBlock = userHash / netHash;
            const prob = 1 - Math.pow((1 - probPerBlock), 144);
            
            document.getElementById('res' + tipo).innerHTML = 
                `Probabilidad (24h): <strong>${(prob * 100).toFixed(6)}%</strong>`;
        }

        // Iniciar
        fetchNetworkHashrates();
    </script>
</body>
</html>
