<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Minería Solo</title>
    <style>
        :root { --btc: #f7931a; --bch: #8dc351; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; }
        .dashboard { width: 100%; max-width: 900px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: var(--card); padding: 2rem; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); border-top: 4px solid var(--border-color); }
        .btc { --border-color: var(--btc); }
        .bch { --border-color: var(--bch); }
        h2 { margin-top: 0; font-size: 1.5rem; }
        .input-group { margin: 1.2rem 0; }
        label { display: block; margin-bottom: 0.5rem; opacity: 0.8; font-size: 0.85rem; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #334155; color: white; box-sizing: border-box; }
        .row { display: grid; grid-template-columns: 1fr 100px; gap: 10px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: var(--border-color); color: white; transition: 0.3s; }
        button:hover { filter: brightness(1.2); }
        .res { margin-top: 1.5rem; padding: 1rem; border-radius: 8px; background: rgba(0,0,0,0.2); text-align: center; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="card btc">
        <h2>Bitcoin (BTC)</h2>
        <div class="input-group">
            <label>Tu Hashrate</label>
            <div class="row">
                <input type="number" id="btcHashVal" placeholder="Ej: 100">
                <select id="btcHashUnit">
                    <option value="0.001">GH/s</option>
                    <option value="1" selected>TH/s</option>
                    <option value="1000">PH/s</option>
                </select>
            </div>
        </div>
        <div class="input-group">
            <label>Hashrate Red (TH/s)</label>
            <input type="number" id="btcNet" placeholder="Cargando...">
        </div>
        <button onclick="calcular('BTC')">Calcular Probabilidad</button>
        <div id="resBTC" class="res">Configura tus valores</div>
    </div>

    <div class="card bch">
        <h2>Bitcoin Cash (BCH)</h2>
        <div class="input-group">
            <label>Tu Hashrate</label>
            <div class="row">
                <input type="number" id="bchHashVal" placeholder="Ej: 100">
                <select id="bchHashUnit">
                    <option value="0.001">GH/s</option>
                    <option value="1" selected>TH/s</option>
                    <option value="1000">PH/s</option>
                </select>
            </div>
        </div>
        <div class="input-group">
            <label>Hashrate Red (TH/s)</label>
            <input type="number" id="bchNet" placeholder="Cargando...">
        </div>
        <button onclick="calcular('BCH')">Calcular Probabilidad</button>
        <div id="resBCH" class="res">Configura tus valores</div>
    </div>
</div>

<script>
    async function init() {
        try {
            // Carga automática BTC
            const btcRes = await fetch('https://blockchain.info/q/hashrate?cors=true');
            document.getElementById('btcNet').value = (await btcRes.text() / 1000).toFixed(2);

            // Carga automática BCH con Proxy CORS
            const bchRes = await fetch('https://corsproxy.io/?https://api.blockchair.com/bitcoin-cash/stats');
            const bchData = await bchRes.json();
            document.getElementById('bchNet').value = (bchData.data.hash_rate_24h / 1e12).toFixed(2);
        } catch (e) { 
            console.log("No se pudieron cargar los datos de red, usa el modo manual."); 
        }
    }

    function calcular(t) {
        const val = parseFloat(document.getElementById(t.toLowerCase() + 'HashVal').value);
        const unit = parseFloat(document.getElementById(t.toLowerCase() + 'HashUnit').value);
        const userHashTH = val * unit;
        const netHashTH = parseFloat(document.getElementById(t.toLowerCase() + 'Net').value);

        if (!userHashTH || !netHashTH) return alert("Por favor ingresa valores válidos");
        
        // Cálculo de probabilidad en 24 horas (144 bloques)
        const prob = (1 - Math.pow((1 - (userHashTH / netHashTH)), 144)) * 100;
        
        document.getElementById('res' + t).innerHTML = `Probabilidad (24h):<br>
            <strong style="font-size: 1.2rem">${prob.toFixed(6)}%</strong>`;
    }

    init();
</script>
</body>
</html>
