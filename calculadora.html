<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Minería Solo Pro</title>
    <style>
        :root { --btc: #f7931a; --bch: #8dc351; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; }
        .dashboard { width: 100%; max-width: 900px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: var(--card); padding: 2rem; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); border-top: 4px solid var(--border-color); }
        .btc { --border-color: var(--btc); }
        .bch { --border-color: var(--bch); }
        h2 { margin-top: 0; font-size: 1.5rem; }
        .input-group { margin: 1rem 0; }
        label { display: block; margin-bottom: 0.3rem; opacity: 0.8; font-size: 0.75rem; }
        .row { display: grid; grid-template-columns: 1fr 100px; gap: 10px; }
        input, select { width: 100%; padding: 10px; border-radius: 8px; border: none; background: #334155; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: var(--border-color); color: white; transition: 0.3s; margin-top: 10px; }
        button:hover { filter: brightness(1.2); }
        .res { margin-top: 1.5rem; padding: 1rem; border-radius: 8px; background: rgba(0,0,0,0.2); font-size: 0.9rem; }
        .res table { width: 100%; border-collapse: collapse; }
        .res td { padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<div class="dashboard">
    <script>
        function renderCard(type) {
            document.write(`
                <div class="card ${type.toLowerCase()}">
                    <h2>${type === 'BTC' ? 'Bitcoin' : 'Bitcoin Cash'} (${type})</h2>
                    <div class="input-group">
                        <label>Mineros x Velocidad</label>
                        <div class="row">
                            <input type="number" id="${type}Count" value="1" placeholder="Cant.">
                            <input type="number" id="${type}Speed" placeholder="Velocidad">
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Unidad y Horas/Día</label>
                        <div class="row">
                            <select id="${type}Unit">
                                <option value="0.001">GH/s</option><option value="1" selected>TH/s</option>
                                <option value="1000">PH/s</option><option value="1000000">EH/s</option>
                            </select>
                            <input type="number" id="${type}Hours" value="24" placeholder="Horas">
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Hashrate Red (TH/s)</label>
                        <input type="number" id="${type}NetVal" placeholder="Cargando...">
                    </div>
                    <button onclick="calcular('${type}')">Calcular Probabilidades</button>
                    <div id="res${type}" class="res">Ingresa tus valores</div>
                </div>
            `);
        }
    </script>

    <script>renderCard('BTC'); renderCard('BCH');</script>
</div>

<script>
    async function init() {
        try {
            // Carga automática BTC
            const btcRes = await fetch('https://blockchain.info/q/hashrate?cors=true');
            document.getElementById('BTCNetVal').value = (await btcRes.text() / 1000).toFixed(2);
        } catch (e) { console.log("Carga automática BTC no disponible."); }
    }

    function calcular(t) {
        const count = parseFloat(document.getElementById(t + 'Count').value);
        const speed = parseFloat(document.getElementById(t + 'Speed').value);
        const unit = parseFloat(document.getElementById(t + 'Unit').value);
        const hours = parseFloat(document.getElementById(t + 'Hours').value);
        const netTH = parseFloat(document.getElementById(t + 'NetVal').value);

        if (!count || !speed || !netTH) return alert("Por favor, completa los campos correctamente.");
        
        // Cálculo del hashrate real aplicado en 24h basado en horas de conexión
        const totalUserTH = (count * speed * unit) * (hours / 24);
        const pPerBlock = totalUserTH / netTH;
        
        // Probabilidades acumuladas en bloques
        const periods = { "1 Día": 144, "1 Semana": 1008, "1 Mes": 4320, "1 Año": 52560 };
        
        let html = "<table>";
        for (let p in periods) {
            const prob = (1 - Math.pow((1 - pPerBlock), periods[p])) * 100;
            html += `<tr><td>${p}:</td><td align="right"><strong>${prob.toFixed(6)}%</strong></td></tr>`;
        }
        document.getElementById('res' + t).innerHTML = html + "</table>";
    }

    init();
</script>
</body>
</html>
