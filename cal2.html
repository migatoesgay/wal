<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Minería BTC Flex</title>
    <style>
        :root { --btc: #f7931a; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; }
        .dashboard { width: 100%; max-width: 500px; }
        .card { background: var(--card); padding: 2rem; border-radius: 16px; border-top: 4px solid var(--btc); }
        .field-group { margin-top: 15px; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 8px; }
        label { display: block; margin: 10px 0 2px 0; font-size: 0.75rem; opacity: 0.8; }
        input { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; background: var(--btc); color: white; font-weight: bold; margin-top: 20px; }
        .res { margin-top: 20px; padding: 15px; background: #0f172a; border-radius: 8px; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="card">
        <h2>Calculadora BTC Flex</h2>
        
        <label>Hashrate Total (TH/s)</label>
        <input type="number" id="hashrate" placeholder="Ej: 100">

        <label>Dificultad (T)</label>
        <input type="number" id="difficulty" placeholder="Ej: 90000">

        <div class="field-group">
            <label>Precio Actual BTC ($)</label>
            <input type="number" id="priceBtc" placeholder="Precio mercado">
            
            <label>Consumo Minero (W)</label>
            <input type="number" id="watts" placeholder="Ej: 3000">
            
            <label>Precio Electricidad ($/kWh)</label>
            <input type="number" id="costKwh" placeholder="Ej: 0.15">
            
            <label>Objetivo Mensual ($)</label>
            <input type="number" id="goalMonth" placeholder="¿Cuánto quieres ganar?">
        </div>

        <button onclick="calcular()">Calcular Rentabilidad</button>
        <div id="resultado" class="res">Introduce los datos para comenzar.</div>
    </div>
</div>

<script>
    function calcular() {
        const hashrate = parseFloat(document.getElementById('hashrate').value) || 0;
        const diff = parseFloat(document.getElementById('difficulty').value) || 1;
        const btcPrice = parseFloat(document.getElementById('priceBtc').value) || 0;
        const watts = parseFloat(document.getElementById('watts').value) || 0;
        const costKwh = parseFloat(document.getElementById('costKwh').value) || 0;
        const goal = parseFloat(document.getElementById('goalMonth').value) || 0;

        // Cálculo de recompensa diaria estimada (simplificado)
        // BTC/día = (Hashrate * 86400) / (Dificultad * 2^32) * 3.125
        const btcPerDay = (hashrate * 1e12 * 86400) / (diff * 1e12 * 4294967296) * 3.125;
        
        const ingresoDiario = btcPerDay * btcPrice;
        const costoDiario = (watts / 1000) * 24 * costKwh;
        const beneficioDiario = ingresoDiario - costoDiario;
        const beneficioMensual = beneficioDiario * 30;

        let html = `<strong>Resultados:</strong><br>
                    - Ingreso bruto/día: $${ingresoDiario.toFixed(2)}<br>
                    - Costo eléctrico/día: $${costoDiario.toFixed(2)}<br>
                    - <b>Beneficio neto mensual: $${beneficioMensual.toFixed(2)}</b>`;

        if (goal > 0) {
            const diferencia = goal - beneficioMensual;
            html += `<br><br>${diferencia > 0 
                ? `Te faltan $${diferencia.toFixed(2)} para tu objetivo.` 
                : `¡Has superado tu objetivo por $${Math.abs(diferencia).toFixed(2)}!`}`;
        }

        document.getElementById('resultado').innerHTML = html;
    }
</script>
</body>
</html>
