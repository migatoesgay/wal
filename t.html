<!DOCTYPE html>
<html lang="es">
<body>
    <h1>Mis Estadísticas Reales</h1>
    <div id="stats">Cargando...</div>

    <script>
        fetch('stats.json')
            .then(response => response.json())
            .then(data => {
                // Accedemos a los datos del worker (el primero del array)
                const worker = data.worker[0];
                document.getElementById('stats').innerHTML = `
                    <p><strong>Hashrate (1 día):</strong> ${worker.hashrate1d}</p>
                    <p><strong>Hashrate (7 días):</strong> ${worker.hashrate7d}</p>
                    <p><strong>Shares Totales:</strong> ${worker.shares}</p>
                `;
            });
    </script>
</body>
</html>
