<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Estado de Minería</title>
</head>
<body>
    <h1>Mis Estadísticas</h1>
    <div id="stats">Cargando...</div>

    <script>
        // Añadimos un timestamp (?t=...) para que el navegador no use una versión vieja
        fetch('stats.json?t=' + new Date().getTime())
            .then(response => {
                if (!response.ok) throw new Error("No se pudo cargar el archivo");
                return response.json();
            })
            .then(data => {
                // Verificamos si existe 'worker' y tiene datos
                if (data.worker && data.worker.length > 0) {
                    const w = data.worker[0];
                    document.getElementById('stats').innerHTML = `
                        <p><strong>Actualización:</strong> ${data.last_updated || 'N/A'}</p>
                        <p><strong>Hashrate (1 día):</strong> ${w.hashrate1d}</p>
                        <p><strong>Total Shares:</strong> ${w.shares}</p>
                        <p><strong>Best Share:</strong> ${Math.round(w.bestshare)}</p>
                    `;
                } else {
                    document.getElementById('stats').innerHTML = "JSON cargado, pero no contiene datos de worker.";
                }
            })
            .catch(err => {
                document.getElementById('stats').innerText = "Error: " + err.message;
            });
    </script>
</body>
</html>
