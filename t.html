<script>
    function intentarCargar(intentos = 3) {
        fetch('stats.json?t=' + new Date().getTime()) // El parámetro 't' evita la caché
            .then(response => response.json())
            .then(data => {
                if (data && data.worker && data.worker.length > 0) {
                    const w = data.worker[0];
                    document.getElementById('stats').innerHTML = `
                        <p><strong>Hashrate (1d):</strong> ${w.hashrate1d}</p>
                        <p><strong>Shares:</strong> ${w.shares}</p>
                    `;
                } else {
                    throw new Error("Estructura JSON inválida");
                }
            })
            .catch(err => {
                if (intentos > 0) {
                    console.log(`Reintentando... quedan ${intentos} intentos.`);
                    setTimeout(() => intentarCargar(intentos - 1), 5000); // Espera 5 segundos
                } else {
                    document.getElementById('stats').innerText = "No se pudieron cargar los datos.";
                }
            });
    }
    intentarCargar();
</script>
