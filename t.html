<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Estadísticas Minería</title>
</head>
<body>
    <h1>Mis Datos de CKPool</h1>
    <div id="stats-container">Cargando...</div>

    <script>
        fetch('stats.json')
            .then(response => response.json())
            .then(data => {
                let html = '<ul>';
                for (const [key, value] of Object.entries(data)) {
                    html += `<li><strong>${key.toUpperCase()}:</strong> ${value}</li>`;
                }
                html += '</ul>';
                document.getElementById('stats-container').innerHTML = html;
            })
            .catch(() => document.getElementById('stats-container').innerText = "Error cargando datos.");
    </script>
</body>
</html>
