<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Minería</title>
</head>
<body>
    <div id="stats">Cargando datos...</div>
    <script>
        fetch('stats.json')
            .then(response => response.json())
            .then(data => {
                const w = data.worker[0];
                document.getElementById('stats').innerHTML = `
                    <p><strong>Última actualización:</strong> ${data.last_updated}</p>
                    <p><strong>Hashrate (1 día):</strong> ${w.hashrate1d}</p>
                    <p><strong>Total Shares:</strong> ${w.shares}</p>
                `;
            })
            .catch(err => {
                document.getElementById('stats').innerText = "Error: Asegúrate de que stats.json existe en la raíz.";
            });
    </script>
</body>
</html>
