<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Minería (BTC)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans antialiased">

    <nav class="border-b border-slate-800 bg-slate-900/40 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="bg-gradient-to-br from-orange-500 to-red-600 text-slate-950 p-2 rounded-xl font-bold flex items-center justify-center shadow-md">
                    <i class="fa-solid fa-bitcoin-sign text-xl text-white"></i>
                </div>
                <div>
                    <h1 class="font-bold text-lg tracking-wide">SoloMining <span class="text-orange-400">Hub</span></h1>
                    <p class="text-xs text-slate-400">Telemetría CKPool</p>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 space-y-6">
        <div class="bg-gradient-to-r from-slate-900 via-slate-900 to-orange-950/20 p-5 rounded-2xl border border-slate-800 shadow-xl">
            <div class="flex items-center space-x-2">
                <span class="text-xs font-bold tracking-wider text-orange-400 uppercase bg-orange-400/10 px-2 py-0.5 rounded">Bitcoin (BTC)</span>
            </div>
            <p class="text-xs text-slate-400 mt-2" id="last-update">Cargando fecha...</p>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4" id="stats-grid">
            <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800/80 shadow-md">
                <p class="text-xs font-medium text-slate-400 mb-2">Hashrate (1 día)</p>
                <div class="flex items-baseline space-x-1 text-orange-400"><span class="text-2xl font-bold" id="hashrate">0.00</span><span class="text-xs font-semibold">TH/s</span></div>
            </div>
            <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800/80 shadow-md">
                <p class="text-xs font-medium text-slate-400 mb-2">Total Shares</p>
                <div class="flex items-baseline text-slate-100"><span class="text-2xl font-bold" id="shares">0</span></div>
            </div>
        </div>
    </main>

    <script>
        fetch('stats.json?t=' + new Date().getTime())
            .then(response => response.json())
            .then(data => {
                if (data.worker && data.worker.length > 0) {
                    const w = data.worker[0];
                    
                    // Cálculo de TH/s (suponiendo que viene como "84M")
                    const hashrateMH = parseFloat(w.hashrate1d.replace('M', ''));
                    const hashrateTH = (hashrateMH / 1000000).toFixed(6);

                    document.getElementById('hashrate').innerText = hashrateTH;
                    document.getElementById('shares').innerText = w.shares.toLocaleString();
                    document.getElementById('last-update').innerText = "Última sincronización: " + (data.last_updated || 'Desconocido');
                }
            })
            .catch(err => console.error("Error cargando stats.json:", err));
    </script>
</body>
</html>
