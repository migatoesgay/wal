<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Minería - Snapshot Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 p-8">

<div class="max-w-4xl mx-auto">
    <h1 class="text-3xl font-bold mb-6">Panel de Minería (Snapshot)</h1>
    <p class="text-slate-400 mb-6" id="last-update">Actualizado: Cargando...</p>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
            <h2 class="text-xl font-bold text-amber-400 mb-2">BCH (SoloMining)</h2>
            <div class="space-y-2">
                <p>Hashrate: <span id="bch-hr" class="font-mono text-white">1.25 TH/s</span></p>
                <p>Workers: <span id="bch-w" class="font-mono text-white">3</span></p>
            </div>
        </div>

        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
            <h2 class="text-xl font-bold text-orange-400 mb-2">BTC (CKPool)</h2>
            <div class="space-y-2">
                <p>Hashrate: <span id="btc-hr" class="font-mono text-white">500 GH/s</span></p>
                <p>Workers: <span id="btc-w" class="font-mono text-white">2</span></p>
            </div>
        </div>

        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
            <h2 class="text-xl font-bold text-emerald-400 mb-2">Public-Pool</h2>
            <div class="space-y-2">
                <p>Hashrate: <span id="pp-hr" class="font-mono text-white">450 GH/s</span></p>
                <p>Workers: <span id="pp-w" class="font-mono text-white">1</span></p>
            </div>
        </div>
    </div>
</div>

<script>
// OBJETO DE DATOS: Actualiza estos valores cuando cambies tu configuración en los pools
const DATA_SNAPSHOT = {
    bch: { hr: "1.25 TH/s", w: "3" },
    btc: { hr: "500 GH/s", w: "2" }, // Corregido a 2 workers
    pp:  { hr: "450 GH/s", w: "1" }
};

function updateUI() {
    // Inyectar datos en los elementos
    document.getElementById('bch-hr').innerText = DATA_SNAPSHOT.bch.hr;
    document.getElementById('bch-w').innerText = DATA_SNAPSHOT.bch.w;

    document.getElementById('btc-hr').innerText = DATA_SNAPSHOT.btc.hr;
    document.getElementById('btc-w').innerText = DATA_SNAPSHOT.btc.w;

    document.getElementById('pp-hr').innerText = DATA_SNAPSHOT.pp.hr;
    document.getElementById('pp-w').innerText = DATA_SNAPSHOT.pp.w;

    // Actualizar hora de la última instantánea
    document.getElementById('last-update').innerText = "Última instantánea: " + new Date().toLocaleTimeString();
    console.log("Dashboard refrescado");
}

// Inicializar al cargar
updateUI();

// Auto-refresco cada 10 minutos (600,000 ms)
setInterval(updateUI, 600000);
</script>

</body>
</html>
