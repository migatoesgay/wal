<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Multi-Crypto Mining Dashboard (Snapshot Mode)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-950 text-slate-100">

<nav class="border-b border-slate-800 p-4">
    <h1 class="text-lg font-bold">SoloMining Hub <span class="text-amber-400">Snapshot</span></h1>
    <p class="text-xs text-slate-400" id="live-clock">Cargando...</p>
</nav>

<main class="max-w-7xl mx-auto p-6">
    <div id="panel-bch" class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
        <h2 class="text-xl font-bold mb-4">Bitcoin Cash (BCH)</h2>
        <p class="text-sm text-slate-400 mb-6">Última actualización: <span id="bch-update"></span></p>
        
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-slate-950 p-4 rounded-xl">
                <p class="text-xs text-slate-500">Hashrate 1m</p>
                <p class="text-2xl font-mono text-amber-400" id="bch-hr1m">—</p>
            </div>
            <div class="bg-slate-950 p-4 rounded-xl">
                <p class="text-xs text-slate-500">Workers</p>
                <p class="text-2xl font-mono text-orange-400" id="bch-workers">—</p>
            </div>
        </div>
    </div>
</main>

<script>
// 1. INSTANTÁNEA DE DATOS (Modifica esto manualmente para actualizar)
const DATA_SNAPSHOT = {
    bch: {
        hashrate1m: "1.25T",
        workers: 1,
        lastupdate: "04/06/2026 12:28",
        chartData: [0.5, 0.8, 1.0, 1.1, 1.25]
    }
};

// 2. FUNCIÓN DE RENDERIZADO SIN ASINCRONÍA
function initDashboard() {
    // Reloj
    document.getElementById('live-clock').innerText = new Date().toLocaleString('es-ES');
    
    // Cargar datos BCH
    const d = DATA_SNAPSHOT.bch;
    document.getElementById('bch-update').innerText = d.lastupdate;
    document.getElementById('bch-hr1m').innerText = d.hashrate1m;
    document.getElementById('bch-workers').innerText = d.workers;

    // Inicializar Gráfico con datos estáticos
    const ctx = document.createElement('canvas'); // Simplificado para el ejemplo
    // Aquí iría tu lógica de Chart.js previa usando d.chartData
    console.log("Dashboard cargado con datos de snapshot.");
}

// 3. EJECUCIÓN INICIAL AL CARGAR LA PÁGINA
window.onload = initDashboard;
</script>
</body>
</html>
