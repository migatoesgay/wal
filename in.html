<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Multi-Crypto Mining Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 p-8">

    <header class="mb-8">
        <h1 class="text-3xl font-bold text-white">Panel de Minería</h1>
        <p id="status-display" class="text-sm text-slate-500">Iniciando sistema...</p>
    </header>

    <button onclick="refreshAll()" class="bg-blue-600 px-4 py-2 rounded-lg text-white font-bold mb-6 hover:bg-blue-500 transition">
        Refrescar todos los datos
    </button>

    <div id="dashboard" class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="bg-slate-900 p-6 rounded-xl border border-slate-800">
            <h2 class="text-xl font-bold text-orange-400 mb-4">Bitcoin (BTC)</h2>
            <div id="btc-data" class="space-y-2">
                <p>Hashrate 5m: <span id="btc-hr" class="font-mono font-bold">---</span></p>
                <p>Workers: <span id="btc-workers" class="font-mono">---</span></p>
            </div>
        </div>

        <div class="bg-slate-900 p-6 rounded-xl border border-slate-800">
            <h2 class="text-xl font-bold text-amber-400 mb-4">Bitcoin Cash (BCH)</h2>
            <div id="bch-data" class="space-y-2">
                <p>Hashrate 1m: <span id="bch-hr" class="font-mono font-bold">---</span></p>
                <p>Status: <span id="bch-status" class="font-mono">---</span></p>
            </div>
        </div>

        <div class="bg-slate-900 p-6 rounded-xl border border-slate-800">
            <h2 class="text-xl font-bold text-cyan-400 mb-4">Public-Pool (BTC)</h2>
            <div id="pp-data" class="space-y-2">
                <p>Hashrate: <span id="pp-hr" class="font-mono font-bold">---</span></p>
                <p>Workers: <span id="pp-workers" class="font-mono">---</span></p>
            </div>
        </div>
    </div>

    <script>
        // Función maestra para romper la caché del navegador
        async function fetchWithCacheBusting(url) {
            const timestamp = new Date().getTime();
            const urlWithCacheBusting = `${url}${url.includes('?') ? '&' : '?'}t=${timestamp}`;
            
            const response = await fetch(urlWithCacheBusting, {
                method: 'GET',
                headers: { 'Cache-Control': 'no-cache', 'Pragma': 'no-cache' }
            });
            
            if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
            return await response.json();
        }

        async function refreshAll() {
            document.getElementById('status-display').innerText = "Actualizando...";
            
            // 1. Carga BTC (Ejemplo con CKPool)
            try {
                const data = await fetchWithCacheBusting('https://eusolostats.ckpool.org/users/bc1q4gp9ycevf88wz8nhej89m4n2w3s760h88845xl');
                document.getElementById('btc-hr').innerText = data.hashrate5m;
                document.getElementById('btc-workers').innerText = data.workers;
            } catch (e) {
                document.getElementById('btc-hr').innerText = "Error API";
            }

            // 2. Carga Public-Pool
            try {
                const data = await fetchWithCacheBusting('https://public-pool.io/api/client/bc1q4gp9ycevf88wz8nhej89m4n2w3s760h88845xl');
                document.getElementById('pp-hr').innerText = data.hashrate5m;
                document.getElementById('pp-workers').innerText = data.workers;
            } catch (e) {
                document.getElementById('pp-hr').innerText = "Error API";
            }

            document.getElementById('status-display').innerText = `Última actualización: ${new Date().toLocaleTimeString()}`;
        }

        // Ejecutar al cargar
        window.onload = refreshAll;
        // Auto-refresco cada 60 segundos
        setInterval(refreshAll, 60000);
    </script>
</body>
</html>
