<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Multi-Crypto Mining Dashboard - Snapshot Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 p-8">

<div class="max-w-4xl mx-auto">
    <h1 class="text-3xl font-bold mb-6">Dashboard Minería (Snapshot 10min)</h1>
    <p class="text-slate-400 mb-4" id="last-global-update">Cargando...</p>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
            <h2 class="text-xl font-bold mb-2">BCH (SoloMining)</h2>
            <div id="bch-content" class="space-y-2">
                <p>Hashrate: <span id="bch-hr" class="font-mono text-amber-400">-</span></p>
                <p>Workers: <span id="bch-w" class="font-mono text-amber-400">-</span></p>
            </div>
        </div>

        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
            <h2 class="text-xl font-bold mb-2">BTC (CKPool)</h2>
            <div id="btc-content" class="space-y-2">
                <p>Hashrate: <span id="btc-hr" class="font-mono text-blue-400">-</span></p>
                <p>Workers: <span id="btc-w" class="font-mono text-blue-400">-</span></p>
            </div>
        </div>

        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
            <h2 class="text-xl font-bold mb-2">Public-Pool</h2>
            <div id="pp-content" class="space-y-2">
                <p>Hashrate: <span id="pp-hr" class="font-mono text-emerald-400">-</span></p>
                <p>Workers: <span id="pp-w" class="font-mono text-emerald-400">-</span></p>
            </div>
        </div>
    </div>
</div>

<script>
// 1. DATA SNAPSHOT: Modifica estos valores para actualizar los datos
const POOL_SNAPSHOTS = {
    bch: { hr: "1.25 TH/s", w: "3" },
    btc: { hr: "500 GH/s", w: "1" },
    pp:  { hr: "450 GH/s", w: "1" }
};

// 2. FUNCIÓN DE ACTUALIZACIÓN
function updateDashboard() {
    const now = new Date().toLocaleTimeString();
    document.getElementById('last-global-update').innerText = "Última instantánea: " + now;

    // Actualizar BCH
    document.getElementById('bch-hr').innerText = POOL_SNAPSHOTS.bch.hr;
    document.getElementById('bch-w').innerText = POOL_SNAPSHOTS.bch.w;

    // Actualizar BTC
    document.getElementById('btc-hr').innerText = POOL_SNAPSHOTS.btc.hr;
    document.getElementById('btc-w').innerText = POOL_SNAPSHOTS.btc.w;

    // Actualizar Public Pool
    document.getElementById('pp-hr').innerText = POOL_SNAPSHOTS.pp.hr;
    document.getElementById('pp-w').innerText = POOL_SNAPSHOTS.pp.w;
    
    console.log("Interfaz refrescada a las " + now);
}

// 3. INTERVALO: 10 minutos (10 * 60 * 1000 ms = 600,000)
setInterval(updateDashboard, 600000);

// Ejecución inicial
updateDashboard();
</script>
</body>
</html>
