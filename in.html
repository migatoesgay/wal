<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Crypto Mining Dashboard - Snapshot Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap');
        body { font-family: 'Syne', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-8">

<div class="max-w-4xl mx-auto space-y-6">
    <h1 class="text-3xl font-bold">Dashboard Minería (Snapshot 10min)</h1>
    <p class="text-amber-500 font-mono" id="last-update">Cargando datos...</p>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <!-- Panel BCH -->
        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 fade-in">
            <h2 class="text-lg font-bold text-amber-400 mb-4">BCH (SoloMining.io)</h2>
            <div class="space-y-2 text-sm">
                <p>Hashrate: <span id="bch-hr" class="mono font-bold text-white">---</span></p>
                <p>Workers: <span id="bch-w" class="mono font-bold text-white">---</span></p>
            </div>
        </div>

        <!-- Panel BTC (CKPool) -->
        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 fade-in">
            <h2 class="text-lg font-bold text-orange-400 mb-4">BTC (Solo CKPool)</h2>
            <div class="space-y-2 text-sm">
                <p>Hashrate: <span id="btc-hr" class="mono font-bold text-white">---</span></p>
                <p>Workers: <span id="btc-w" class="mono font-bold text-white">---</span></p>
            </div>
        </div>

        <!-- Panel Public-Pool -->
        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 fade-in">
            <h2 class="text-lg font-bold text-cyan-400 mb-4">Public-Pool</h2>
            <div class="space-y-2 text-sm">
                <p>Hashrate: <span id="pp-hr" class="mono font-bold text-white">---</span></p>
                <p>Workers: <span id="pp-w" class="mono font-bold text-white">---</span></p>
            </div>
        </div>
    </div>
</div>

<script>
// DATOS DEFINIDOS (puedes cambiarlos aquí manualmente)
const SNAPSHOT_DATA = {
    bch: { hr: "1.25 TH/s", w: "3" },
    // AQUÍ ACTUALIZAMOS A 2 TRABAJADORES
    btc: { hr: "500 GH/s", w: "2" }, 
    pp:  { hr: "450 GH/s", w: "1" }
};

function refreshDashboard() {
    // Inyectar datos en el DOM
    document.getElementById('bch-hr').innerText = SNAPSHOT_DATA.bch.hr;
    document.getElementById('bch-w').innerText = SNAPSHOT_DATA.bch.w;
    
    document.getElementById('btc-hr').innerText = SNAPSHOT_DATA.btc.hr;
    document.getElementById('btc-w').innerText = SNAPSHOT_DATA.btc.w;
    
    document.getElementById('pp-hr').innerText = SNAPSHOT_DATA.pp.hr;
    document.getElementById('pp-w').innerText = SNAPSHOT_DATA.pp.w;

    // Actualizar timestamp
    const now = new Date().toLocaleTimeString();
    document.getElementById('last-update').innerText = "Última instantánea: " + now;
    
    console.log("Snapshot inyectado a las " + now);
}

// Ejecutar cada 10 minutos (600,000 ms)
setInterval(refreshDashboard, 600000);

// Carga inicial
refreshDashboard();
</script>
</body>
</html>
