name: Actualizar Estadísticas
on:
  schedule:
    - cron: '*/15 * * * *' # Se ejecuta cada 15 minutos
  workflow_dispatch: # Permite ejecutarlo manualmente desde la web de GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # IMPORTANTE: Esto permite al script subir cambios al repositorio
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Instalar dependencias
        run: pip install requests

      - name: Ejecutar script de minería
        run: python fetch_stats.py

      - name: Subir cambios a GitHub
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add stats.json
          # El '|| exit 0' evita error si no hay cambios que guardar
          git commit -m "Actualización automática de stats.json" || exit 0
          git push
